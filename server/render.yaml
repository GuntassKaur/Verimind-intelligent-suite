services:
  - type: web
    name: verimind-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PORT
        value: 5000
      - key: FLASK_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: CLIENT_URL
        value: https://verimind-intelligent-suite-np75.vercel.app
      - key: FRONTEND_URL
        value: https://verimind-intelligent-suite-np75.vercel.app
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
