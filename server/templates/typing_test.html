<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeriMind // Typing Test</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .typing-display {
            line-height: 2;
            font-size: 20px;
            font-family: var(--font-mono);
            color: var(--text-muted);
            transition: color 0.3s ease;
            text-align: left;
        }

        .char.current {
            background: rgba(99, 102, 241, 0.2);
            border-radius: 4px;
            color: white;
        }

        .char.correct {
            color: #10b981;
        }

        .char.incorrect {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 4px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: 16px;
            text-align: center;
        }

        .stat-val {
            font-size: 32px;
            font-weight: 800;
            color: white;
            margin: 8px 0;
        }

        .stat-label {
            font-size: 11px;
            font-weight: 800;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>
    <!-- Top Navigation -->
    <nav class="navbar">
        <a href="/" class="nav-brand">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
            </svg>
            <span>VeriMind</span>
        </a>

        <div class="nav-menu">
            <a href="/" class="nav-item">Dashboard</a>
            <a href="/generation" class="nav-item">Generator</a>
            <a href="/analyzer" class="nav-item">Analyzer</a>
            <a href="/plagiarism" class="nav-item">Plagiarism</a>
            <a href="/humanize" class="nav-item">Humanizer</a>
            <a href="/typing-test" class="nav-item active">Typing Test</a>
            <a href="/history" class="nav-item">History</a>
        </div>

        <div class="nav-auth">
            <a href="/history" class="btn btn-ghost" style="padding: 8px 16px; font-size: 13px;">Records</a>
        </div>
    </nav>

    <main class="main-container">
        <header style="margin-bottom: 40px;">
            <span class="badge">Practice</span>
            <h1 style="font-size: 32px; font-weight: 800; margin-top: 8px;">Typing Test</h1>
        </header>

        <div class="app-split">
            <!-- Left: Inputs -->
            <section class="control-panel">
                <div id="setup-view">
                    <span class="input-label">Select Difficulty</span>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px;">
                        <button onclick="setDiff(this, 'Medium')" class="btn btn-ghost active"
                            style="font-size: 13px;">Medium</button>
                        <button onclick="setDiff(this, 'Hard')" class="btn btn-ghost"
                            style="font-size: 13px;">Hard</button>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 24px;">
                        <button onclick="setTime(this, 30)" class="btn btn-ghost" style="font-size: 13px;">30s</button>
                        <button onclick="setTime(this, 60)" class="btn btn-ghost active"
                            style="font-size: 13px;">60s</button>
                        <button onclick="setTime(this, 120)" class="btn btn-ghost"
                            style="font-size: 13px;">120s</button>
                    </div>

                    <button id="start-btn" class="btn btn-primary" style="width: 100%;">START TEST</button>
                </div>

                <div id="game-view" style="display: none;">
                    <button id="cancel-btn" class="btn btn-ghost"
                        style="width: 100%; margin-bottom: 24px; color: #ef4444; border-color: rgba(239,68,68,0.2);">Abort
                        Test</button>
                    <div id="text-display" class="typing-display"
                        style="height: 400px; overflow-y: auto; padding: 24px; background: rgba(0,0,0,0.2); border-radius: 12px;">
                    </div>
                    <input id="hidden-input" autocomplete="off" style="opacity: 0; position: absolute; z-index: -1;">
                    <p style="text-align: center; font-size: 12px; color: var(--text-muted); margin-top: 16px;">Type to
                        begin typing</p>
                </div>
            </section>

            <!-- Right: Stats -->
            <section class="result-panel">
                <div style="display: grid; gap: 20px;">
                    <div class="stat-card">
                        <div class="stat-label">Words Per Minute</div>
                        <div id="hud-wpm" class="stat-val">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Time Remaining</div>
                        <div id="hud-time" class="stat-val">60</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Accuracy</div>
                        <div id="hud-acc" class="stat-val">100%</div>
                    </div>
                </div>

                <div id="result-overlay" style="display: none; margin-top: 32px; text-align: center;">
                    <h2 style="font-size: 24px; font-weight: 800; color: var(--accent-indigo); margin-bottom: 16px;">
                        Test Complete!</h2>
                    <button onclick="window.location.reload()" class="btn btn-primary" style="width: 100%;">START NEW
                        TEST</button>
                </div>
            </section>
        </div>
    </main>

    <script>
        let config = { diff: 'Medium', time: 60 };
        let state = { playing: false, text: '', index: 0, errors: 0, start: 0, timer: null, left: 60 };

        function setDiff(el, d) {
            document.querySelectorAll('#setup-view button').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            config.diff = d;
        }

        function setTime(el, t) {
            document.querySelectorAll('#setup-view button').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            config.time = t;
            state.left = t;
            document.getElementById('hud-time').innerText = t;
        }

        document.getElementById('start-btn').onclick = async () => {
            const btn = document.getElementById('start-btn');
            btn.innerText = 'LOADING...';
            try {
                const res = await fetch('/api/typing/get-text', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ difficulty: config.diff })
                });
                const data = await res.json();
                state.text = data.text;
                state.left = config.time;
                state.index = 0;

                document.getElementById('setup-view').style.display = 'none';
                document.getElementById('game-view').style.display = 'block';

                renderText();
                const input = document.getElementById('hidden-input');
                input.focus();
                document.getElementById('text-display').onclick = () => input.focus();
            } catch (e) {
                alert("Failed to load text.");
            }
        };

        function renderText() {
            const display = document.getElementById('text-display');
            display.innerHTML = state.text.split('').map((c, i) => `<span class="char" id="c-${i}">${c}</span>`).join('');
            mark(0, 'current');
        }

        function mark(i, cls) {
            const el = document.getElementById('c-' + i);
            if (el) el.className = 'char ' + cls;
        }

        const input = document.getElementById('hidden-input');
        input.addEventListener('input', () => {
            if (!state.playing) startTimer();
            const val = input.value;
            input.value = '';
            for (let char of val) {
                if (state.index >= state.text.length) break;
                if (char === state.text[state.index]) {
                    mark(state.index, 'correct');
                } else {
                    mark(state.index, 'incorrect');
                    state.errors++;
                }
                state.index++;
                if (state.index < state.text.length) mark(state.index, 'current');
                updateHud();
            }
        });

        function startTimer() {
            state.playing = true;
            state.start = Date.now();
            state.timer = setInterval(() => {
                state.left--;
                document.getElementById('hud-time').innerText = state.left;
                updateHud();
                if (state.left <= 0) endTest();
            }, 1000);
        }

        function updateHud() {
            const elapsed = (Date.now() - state.start) / 1000 / 60;
            const wpm = Math.round((state.index / 5) / (elapsed || 0.01));
            const acc = Math.round(((state.index - state.errors) / (state.index || 1)) * 100);
            document.getElementById('hud-wpm').innerText = wpm;
            document.getElementById('hud-acc').innerText = acc + '%';
        }

        function endTest() {
            clearInterval(state.timer);
            state.playing = false;
            document.getElementById('hidden-input').disabled = true;
            document.getElementById('result-overlay').style.display = 'block';
        }

        document.getElementById('cancel-btn').onclick = () => window.location.reload();
    </script>
    <script src="/static/typing_tracker.js"></script>
</body>

</html>
