<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeriMind // Content Analyzer</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .risk-badge {
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .risk-low {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .risk-med {
            background: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .risk-high {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .claim-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .claim-status {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
        }

        .heatmap-seg {
            padding: 2px 4px;
            border-radius: 4px;
            cursor: help;
        }
    </style>
</head>

<body>
    <!-- Top Navigation -->
    <nav class="navbar">
        <a href="/" class="nav-brand">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
            </svg>
            <span>VeriMind</span>
        </a>

        <div class="nav-menu">
            <a href="/" class="nav-item">Dashboard</a>
            <a href="/generation" class="nav-item">Generator</a>
            <a href="/analyzer" class="nav-item active">Analyzer</a>
            <a href="/plagiarism" class="nav-item">Plagiarism</a>
            <a href="/humanize" class="nav-item">Humanizer</a>
            <a href="/typing-test" class="nav-item">Typing Test</a>
            <a href="/history" class="nav-item">Archive</a>
        </div>

        <div class="nav-auth">
            <a href="/history" class="btn btn-ghost" style="padding: 8px 16px; font-size: 13px;">Records</a>
        </div>
    </nav>

    <main class="main-container">
        <header style="margin-bottom: 40px;">
            <span class="badge">Verification Tool</span>
            <h1 style="font-size: 32px; font-weight: 800; margin-top: 8px;">Content Analyzer</h1>
        </header>

        <div class="app-split">
            <!-- Left: Inputs -->
            <section class="control-panel">
                <span class="input-label">Core Hypothesis</span>
                <textarea id="query" class="text-input" style="height: 120px;"
                    placeholder="What fact or question do you want to verify?"></textarea>

                <span class="input-label">AI Response (Optional)</span>
                <textarea id="response" class="text-input"
                    style="height: 280px; font-family: var(--font-mono); font-size: 13px;"
                    placeholder="Paste the AI answer here, or leave blank to let VeriMind generate and verify its own..."></textarea>

                <button id="analyze-btn" class="btn btn-primary" style="width: 100%;">START VERIFICATION</button>
            </section>

            <!-- Right: Results -->
            <section class="result-panel">
                <div id="results-placeholder" style="text-align: center; color: var(--text-muted); padding: 80px 0;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        style="width: 48px; height: 48px; opacity: 0.2; margin-bottom: 16px; display: block; margin-left: auto; margin-right: auto;">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <p>Enter audit parameters to initialize analysis.</p>
                </div>

                <div id="results-content" style="display: none;">
                    <div
                        style="display: flex; gap: 16px; margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid var(--border);">
                        <div>
                            <span class="input-label">Verdict</span>
                            <div id="verdict" style="font-size: 20px; font-weight: 800; color: white;"></div>
                        </div>
                        <div style="margin-left: auto; text-align: right;">
                            <span class="input-label">Risk Level</span>
                            <div id="risk-display"></div>
                        </div>
                    </div>

                    <div style="margin-bottom: 32px;">
                        <span class="input-label">Summary</span>
                        <p id="summary" style="font-size: 14px; color: var(--text-secondary); line-height: 1.6;"></p>
                    </div>

                    <span class="input-label">Verification Details</span>
                    <div id="claims-list" style="margin-top: 16px;"></div>
                </div>
            </section>
        </div>
    </main>

    <script>
        const btn = document.getElementById('analyze-btn');
        const resultsPlaceholder = document.getElementById('results-placeholder');
        const resultsContent = document.getElementById('results-content');

        btn.onclick = async () => {
            const query = document.getElementById('query').value;
            const response = document.getElementById('response').value;
            if (!query.trim()) return alert("Question required.");

            btn.innerText = 'AUDITING...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, response })
                });
                const data = await res.json();

                resultsPlaceholder.style.display = 'none';
                resultsContent.style.display = 'block';

                document.getElementById('verdict').innerText = data.verdict;

                const riskEl = document.getElementById('risk-display');
                const score = data.integrity_score;
                let risk = "Low";
                if (score < 40) risk = "High";
                else if (score < 75) risk = "Med";

                riskEl.innerHTML = `<span class="risk-badge risk-${risk.toLowerCase()}">${risk} RISK (${score}%)</span>`;

                document.getElementById('summary').innerText = data.explanation;

                const claimsList = document.getElementById('claims-list');
                claimsList.innerHTML = '';
                const sentences = data.sentences || [];
                sentences.forEach(c => {
                    const card = document.createElement('div');
                    card.className = 'claim-card';
                    card.innerHTML = `
                        <span class="claim-status ${c.heat_grade === 'Low' ? 'risk-low' : c.heat_grade === 'High' ? 'risk-high' : 'risk-med'}" style="display: inline-block; padding: 2px 8px; border-radius: 4px;">${c.risk_label}</span>
                        <p style="font-size: 14px; font-weight: 600; margin: 8px 0; color: white;">${c.text}</p>
                        <p style="font-size: 12px; color: var(--text-secondary);">${c.explanation}</p>
                    `;
                    claimsList.appendChild(card);
                });

            } catch (err) {
                alert("Connection failed.");
            } finally {
                btn.innerText = 'START VERIFICATION';
                btn.disabled = false;
            }
        };
    </script>
    <script src="/static/typing_tracker.js"></script>
</body>

</html>
